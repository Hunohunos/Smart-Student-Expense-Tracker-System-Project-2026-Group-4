<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | ExpenseTracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(102, 126, 234, 0.95), transparent 35%),
                  linear-gradient(135deg, #667eea 0%, #764ba2 70%, #1b1f45 100%);
      color: #fff;
      font-family: "Inter", system-ui, sans-serif;
    }
    .glass-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
    }
    .form-control,
    .form-select {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border-color: rgba(255,255,255,0.4);
      box-shadow: none;
    }
    .btn-primary {
      background: #7f6bff;
      border: none;
    }
    .btn-primary:hover {
      background: #6a58f2;
    }
    .modal-content {
      color: black;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center align-items-center vh-100">
      <div class="col-xl-5 col-lg-6 col-md-8">
        <div class="card glass-card p-4 p-md-5 rounded-4">
          <div class="text-center mb-4">
            <h1 class="h3 mb-2">Forgot Password</h1>
            <p class="text-white-50 mb-0">Enter your registered email and we'll send you a new password.</p>
          </div>
          <form id="forgotPageForm" class="needs-validation" novalidate>
            <div class="mb-4">
              <label class="form-label" for="forgotEmail">Email address</label>
              <input type="email" class="form-control" id="forgotEmail" placeholder="name@example.com" required />
              <div class="invalid-feedback">Please enter a valid email.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send New Password</button>
          </form>
          <p class="text-center text-white-50 mt-4 mb-0">Remembered your account? <a href="login.html" class="text-white">Sign in</a></p>
          <p class="text-center text-white-50 mt-2 mb-0"><a href="index.html" class="text-white">Back to Home</a></p>
        </div>
      </div>
    </div>
  </div>
  <script>
  // ── API helpers ──────────────────────────────────────────────────
  const api = {
    get: (url) =>
      fetch(url, { credentials: 'include' }).then(r => r.json()),
    post: (url, data) =>
      fetch(url, { method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data) }).then(r => r.json()),
    put: (url, data) =>
      fetch(url, { method: 'PUT', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data) }).then(r => r.json()),
    delete: (url, data) =>
      fetch(url, { method: 'DELETE', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data) }).then(r => r.json()),
  };

  // Returns the current user object, or redirects to login.html
  async function checkSession(requiredRole) {
    const res = await api.get('api/session.php');
    if (!res.loggedIn) { window.location.href = 'login.html'; return null; }
    if (requiredRole && res.user.role !== requiredRole) {
      window.location.href = 'login.html'; return null;
    }
    return res.user;
  }

  async function logout() {
    await api.post('api/logout.php', {});
    window.location.href = 'login.html';
  }
  // ────────────────────────────────────────────────────────────────
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const forgotPageForm = document.getElementById('forgotPageForm');
    forgotPageForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!forgotPageForm.checkValidity()) {
        forgotPageForm.classList.add('was-validated');
        return;
      }
      const email = document.getElementById('forgotEmail').value.trim().toLowerCase();
      
      const submitBtn = forgotPageForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      const res = await api.post('api/forgot-password.php', { email });
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send New Password';

      showAlert(res.error ? res.error : (res.message || 'If that email is registered, a new password has been sent.'));

      /*const users = JSON.parse(localStorage.getItem('expenseTracker_users') || '{}');
      if (!users[email]) {
        showAlert('We couldn\'t find an account with that email address. Please check and try again.');
        return;
      }
      users[email].password = newPassword;
      localStorage.setItem('expenseTracker_users', JSON.stringify(users));
      showAlert('Your password has been updated successfully. Please log in with your new password.');
      window.location.href = 'login.html';*/
    });

    function showAlert(message) {
      document.getElementById('alertMessage').textContent = message;
      const modal = new bootstrap.Modal(document.getElementById('alertModal'));
      modal.show();
    }
  </script>
  <div class="modal fade" id="alertModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="alertMessage">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
