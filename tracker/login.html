<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ExpenseTracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(102, 126, 234, 0.95), transparent 35%),
                  linear-gradient(135deg, #667eea 0%, #764ba2 70%, #1b1f45 100%);
      color: #ffffff;
      font-family: "Inter", system-ui, sans-serif;
    }
    .glass-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
    }
    .form-control,
    .form-select {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #000000;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border-color: rgba(255,255,255,0.4);
      box-shadow: none;
    }
    .btn-primary {
      background: #7f6bff;
      border: none;
    }
    .btn-primary:hover {
      background: #6a58f2;
    }
    .modal-content {
      color: black;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center align-items-center vh-100">
      <div class="col-xl-5 col-lg-6 col-md-8">
        <div class="card glass-card p-4 p-md-5 rounded-4">
          <div class="text-center mb-4">
            <h1 class="h3 mb-2">Sign In</h1>
            <p class="text-white-50 mb-0">Sign in to your ExpenseTracker account.</p>
          </div>
          <form id="loginForm" class="needs-validation" novalidate>
            <div class="mb-3">
              <label class="form-label" for="email">Email address</label>
              <input type="email" class="form-control" id="email" placeholder="name@example.com" required />
              <div class="invalid-feedback">Please enter a valid email.</div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter your password" required minlength="4" />
              <div class="invalid-feedback">Your password is required.</div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="role">Login as</label>
              <select class="form-select" id="role" required>
                <option value="">Select role...</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
              <div class="invalid-feedback">Please select a role.</div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <a href="forgot-password.html" class="text-white-50">Forgot password?</a>
              <button type="submit" class="btn btn-primary">Login</button>
            </div>
          </form>
          <div class="d-flex justify-content-between align-items-center mt-3">
            <a href="index.html" class="btn btn-outline-light">Back to Home</a>
            <p class="text-center text-white-50 mb-0 flex-grow-1 ms-3">Don't have an account? <a href="register.html" class="text-white">Register now</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
  // ── API helpers ──────────────────────────────────────────────────
  const api = {
    get: (url) =>
      fetch(url, { credentials: 'include' }).then(r => r.json()),
    post: (url, data) =>
      fetch(url, { method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data) }).then(r => r.json()),
    put: (url, data) =>
      fetch(url, { method: 'PUT', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data) }).then(r => r.json()),
    delete: (url, data) =>
      fetch(url, { method: 'DELETE', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data) }).then(r => r.json()),
  };

  // Returns the current user object, or redirects to login.html
  async function checkSession(requiredRole) {
    const res = await api.get('api/session.php');
    if (!res.loggedIn) { window.location.href = 'login.html'; return null; }
    if (requiredRole && res.user.role !== requiredRole) {
      window.location.href = 'login.html'; return null;
    }
    return res.user;
  }

  async function logout() {
    await api.post('api/logout.php', {});
    window.location.href = 'login.html';
  }
  // ────────────────────────────────────────────────────────────────
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!--<script>
    // Demo credentials
    const ADMIN_EMAIL = 'admin@example.com';
    const ADMIN_PASSWORD = 'admin123';
  </script>-->
  <script>
    const loginForm = document.getElementById('loginForm');
    //const users = JSON.parse(localStorage.getItem('expenseTracker_users') || '{}');

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!loginForm.checkValidity()) {
        loginForm.classList.add('was-validated');
        return;
      }
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value.trim();
      const role     = document.getElementById('role').value;

      const res = await api.post('api/login.php', { email, password });
      if (res.error) { showAlert(res.error); return; }

      // Admin accounts can log in as either role.
      // Regular user accounts can only log in as "user".
      if (res.role === 'user' && role === 'admin') {
        showAlert('This account does not have admin access.');
        return;
      }

      // Redirect: if the selected role is "admin", go to admin dashboard;
      // otherwise go to the user expenses page.
      window.location.href = role === 'admin' ? 'admin-dashboard.html' : 'expenses.html';
    });

    function showAlert(message) {
      document.getElementById('alertMessage').textContent = message;
      const modal = new bootstrap.Modal(document.getElementById('alertModal'));
      modal.show();
    }
  </script>
  <div class="modal fade" id="alertModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Message</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="alertMessage">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
